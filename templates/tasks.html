<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Master | Secure Task Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');
        :root {
            --bg: #020617;
            --glass-card: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.06);
            --primary: #00f2fe;
            --active-green: #00ff88;
            --danger: #ff0055;
            --gold: #ffaa00;
            --text-main: #f1f5f9;
            --text-gray: #94a3b8;
        }
        /* এনিমেশন কীফ্রেম */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes fillProgress {
            from { width: 0%; }
            to { width: var(--percent); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: #00ff88; }
            100% { transform: scale(1); }
        }
        #dropdownMenu a:hover {
            background: rgba(0, 242, 254, 0.15);
            transform: translateX(5px);
        }
        #dropdownArrow.rotated { transform: rotate(180deg); }
        #taskToggleBtn { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .task-card { padding: 6px 8px !important; margin-bottom: 6px !important; animation: fadeInUp 0.3s ease; }
        .task-icon { width: 25px !important; height: 25px !important; font-size: 10px !important; }
        .task-info h4 { font-size: 10px !important; font-weight: bold !important; }
        .task-info p { font-size: 8px !important; }
        .reward-tag { font-size: 10px !important; }
        .btn-claim { padding: 5px !important; font-size: 5px !important; }
        .task-top { gap: 5px !important; margin-bottom: 5px !important; }
        .container { max-width: 400px !important; padding: 5px !important; }
        .header { padding: 11px 11px !important; }
        .header h2 { font-size: 8px !important; }
        .header-bal-box { padding: 4px 8px !important; font-size: 7px !important; }
        .join-warn { padding: 4px !important; font-size: 8px !important; margin-bottom: 5px !important; }
        .banner-ad-box { min-height: 60px !important; margin-bottom: 5px !important; }
        .milestone-item { padding: 5px 8px !important; margin-bottom: 4px !important; animation: fadeInUp 0.3s ease; }
        .milestone-item h4 { font-size: 8px !important; }
        .milestone-item .progress-bar { height: 8px !important; margin: 3px 0 !important; }
        .milestone-reward { font-size: 8px !important; }
        .btn-milestone-claim { padding: 4px 8px !important; font-size: 6px !important; }
        .dock-nav { height: 55px !important; }
        .nav-item i { font-size: 16px !important; }
        .nav-item span { font-size: 8px !important; }
        .dock-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 2000; }
        .dock-nav { width: 90%; max-width: 400px; height: 70px; background: rgba(15, 23, 42, 0.95); border-radius: 35px; border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .notification-toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #1e293b, #0f172a); backdrop-filter: blur(12px); border-radius: 40px; padding: 12px 24px; display: flex; align-items: center; gap: 12px; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); pointer-events: none; max-width: 85%; font-family: 'Rajdhani', monospace; }
        .notification-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .notification-toast.success { border-left: 5px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .notification-toast.error { border-left: 5px solid #ff0055; box-shadow: 0 0 20px rgba(255,0,85,0.2); }
        .notification-toast.warning { border-left: 5px solid #ffaa00; box-shadow: 0 0 20px rgba(255,170,0,0.2); }
        .notification-toast.info { border-left: 5px solid #00f2fe; box-shadow: 0 0 20px rgba(0,242,254,0.2); }
        .notification-icon { font-size: 20px; }
        .notification-text { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: #fff; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 120px; background-image: radial-gradient(circle at 50% 0%, rgba(112,0,255,0.15) 0%, transparent 70%); overflow-x: hidden; }
        .header { background: rgba(15,23,42,0.9); backdrop-filter: blur(20px); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; }
        .header h2 { font-family: 'Syncopate'; font-size: 11px; color: var(--primary); margin: 0; text-shadow: 0 0 10px rgba(0,242,254,0.4); letter-spacing: 1px; }
        .header-bal-box { background: rgba(0,0,0,0.4); padding: 7px 12px; border-radius: 20px; border: 1px solid var(--glass-border); font-family: 'Syncopate'; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .container { padding: 15px; max-width: 550px; margin: 0 auto; }
        .banner-ad-box { width: 100%; min-height: 70px; border-radius: 16px; overflow: hidden; margin-bottom: 15px; border: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.25); color: var(--text-gray); text-align: center; box-sizing: border-box; padding: 10px; }
        .join-warn { background: rgba(255,0,85,0.1); border: 1px solid rgba(255,0,85,0.2); padding: 10px; border-radius: 12px; text-align: center; color: #ff99bb; font-size: 11px; margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .milestones-container { margin-bottom: 15px; }
        .milestone-item { background: var(--glass-card); border: 1px solid rgba(255,170,0,0.15); border-radius: 18px; padding: 12px; margin-bottom: 12px; text-align: left; }
        .milestone-item h4 { font-size: 10px; margin: 0 0 4px; color: var(--gold); }
        .progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin: 6px 0; }
        .progress-fill { height: 50%; background: linear-gradient(90deg, var(--gold), #ffdd00); width: 0%; transition: 0.5s; }
        .btn-milestone-claim { background: var(--gold); border: none; padding: 6px 12px; border-radius: 20px; font-size: 9px; font-weight: bold; cursor: pointer; margin-top: 6px; color: #000; }
        .task-card { background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 12px; transition: 0.3s; position: relative; backdrop-filter: blur(20px); box-sizing: border-box; }
        .task-card.locked { opacity: 0.45; filter: grayscale(1); pointer-events: none; }
        .task-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .task-icon { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--primary); border: 1px solid var(--glass-border); flex-shrink: 0; }
        .task-info { flex-grow: 1; overflow: hidden; }
        .task-info h4 { margin: 0; font-size: 14px; color: #fff; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-info p { margin: 2px 0 0; font-size: 10px; color: var(--text-gray); }
        .reward-tag { text-align: right; color: var(--active-green); font-size: 12px; font-family: 'Syncopate'; font-weight: bold; flex-shrink: 0; margin-left: auto; }
        .btn-claim { width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Syncopate'; font-size: 9px; letter-spacing: 1px; background: linear-gradient(135deg, var(--primary), #0088cc); color: #000; box-shadow: 0 4px 12px rgba(0,242,254,0.15); }
        .btn-claim:active { transform: scale(0.97); }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 10px; text-align: center; transition: 0.3s; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px rgba(0,242,254,0.4); }
    </style>
</head>
<body>
<header class="header">
    <div style="display: flex; align-items: center; gap: 12px; position: relative;">
        <h2 style="margin:0; background: linear-gradient(135deg, #00f2fe, #7000ff); -webkit-background-clip: text; background-clip: text; color: transparent;">AAF TELE TASK</h2>
        <!-- ড্রপডাউন বাটন -->
        <div style="position: relative;">
            <button id="taskDropdownBtn" onclick="toggleDropdown()" style="display: flex; align-items: center; gap: 8px; border: none; padding: 6px 18px; border-radius: 40px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; background: linear-gradient(135deg, #00f2fe, #00c8ff); color: #000; box-shadow: 0 2px 10px rgba(0,242,254,0.5);">
                <span id="dropdownIcon">📋</span>
                <span id="dropdownText">Task</span>
                <span style="font-size: 10px; opacity: 0.8; transition: transform 0.3s;" id="dropdownArrow">▼</span>
            </button>
            <div id="dropdownMenu" style="position: absolute; top: 45px; left: 0; background: rgba(15,23,42,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(0,242,254,0.2); border-radius: 20px; padding: 8px 0; min-width: 160px; z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <a href="/task" onclick="selectOption('task')" style="display: flex; align-items: center; gap: 10px; padding: 10px 20px; text-decoration: none; color: #fff; font-size: 12px; font-weight: bold; transition: 0.2s; border-radius: 12px; margin: 2px 8px;">
                    <span>📋</span> Task
                </a>
                <a href="/task_order" onclick="selectOption('order')" style="display: flex; align-items: center; gap: 10px; padding: 10px 20px; text-decoration: none; color: #fff; font-size: 12px; font-weight: bold; transition: 0.2s; border-radius: 12px; margin: 2px 8px;">
                    <span>📦</span> Task Order
                </a>
            </div>
        </div>
    </div>
    <div class="header-bal-box">
        <span style="color: var(--active-green);">৳ <span id="u-bal">0.00</span></span>
        <span style="color: var(--glass-border); margin: 0 5px;">|</span>
        <span style="color: var(--gold);">AAF <span id="u-coin">0.00</span></span>
    </div>
</header>
<div class="container">
    <div class="banner-ad-box" id="banner-ad">
        <p style="font-size: 9px; letter-spacing: 2px; color: var(--text-gray); margin: 0;">
            <i class="fas fa-ad" style="margin-right:5px;"></i> GLOBAL ADVERTISING UNIT
        </p>
    </div>
    <div class="join-warn" id="join-warning">
        <i class="fas fa-exclamation-triangle"></i> বোনাস আনলক করতে অফিশিয়াল চ্যানেলে জয়েন করুন!
    </div>
    <div id="due-warning" style="display: none;"></div>
    <div id="milestones-container"></div>
    <div id="main-task-list">
        <div style="text-align:center; padding:40px; color:var(--text-gray); font-size: 11px;">
            <i class="fas fa-spinner fa-spin" style="margin-right: 5px;"></i> এএএফ ইঞ্জিন লোড হচ্ছে...
        </div>
    </div>
</div>
<div class="dock-container">
    <nav class="dock-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
        <a href="/tasks" class="nav-item active"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="/trading" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </nav>
</div>

<script>
const API = window.location.origin;
const TG_KEY = "telegram_id";
let DEVICE_ID = "";
let USER_JOINED = false;
let isTaskRunning = false;

// ========== ডিভাইস আইডি (FingerprintJS ছাড়া) ==========
function getDeviceId() {
    let deviceId = localStorage.getItem('device_id');
    if (!deviceId) {
        deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_id', deviceId);
    }
    return deviceId;
}

function getTG() {
    const id = localStorage.getItem(TG_KEY);
    if (!id) location.href = "/login";
    return id;
}

function updateBalance(cash, aaf) {
    console.log("💰 Updating balance:", { cash, aaf });
    const cashEl = document.getElementById('u-bal');
    const coinEl = document.getElementById('u-coin');
    if (cashEl) cashEl.innerText = parseFloat(cash || 0).toFixed(2);
    if (coinEl) coinEl.innerText = parseFloat(aaf || 0).toFixed(2);
}

// ========== টাস্ক লোড ==========
async function loadTasksFromAPI(apiUrl) {
    const taskContainer = document.getElementById('main-task-list');
    if (taskContainer) {
        taskContainer.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin"></i> লোড হচ্ছে...</div>`;
    }
    try {
        const res = await fetch(apiUrl, { credentials: 'include' });
        const data = await res.json();
        const tasks = data.tasks || [];
        if (tasks.length > 0) {
            renderTasks(tasks);
        } else {
            taskContainer.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-inbox"></i> কোনো টাস্ক নেই</div>`;
        }
    } catch (err) {
        console.error("Task load error:", err);
        taskContainer.innerHTML = `<div style="text-align:center; padding:40px; color: #ff5555;"><i class="fas fa-exclamation-triangle"></i> লোড করতে ব্যর্থ</div>`;
    }
}

window.addEventListener('load', async () => {
    console.log("✅ Tasks page loaded");
    DEVICE_ID = getDeviceId();
    console.log("🆔 Device ID:", DEVICE_ID);
    await initTaskPage();
    await loadDueStatus();
    setInterval(() => {
        if (!isTaskRunning) initTaskPage();
    }, 30000);
});

async function initTaskPage() {
    try {
        const userRes = await fetch(`${API}/api/user/me`, {
            headers: { 'x-device-id': DEVICE_ID },
            credentials: "include"
        });
        const userData = await userRes.json();
        console.log("📡 User data:", userData);
        if (userData.status !== "success") return;

        const milestonesRes = await fetch(`${API}/api/user/milestones`, { credentials: 'include' });
        const milestonesData = await milestonesRes.json();

        renderTaskUI(userData.user, userData.admin, [], milestonesData.milestones || []);
        await loadTasksFromAPI('/api/tasks');
    } catch (err) {
        console.log("Init Error", err);
    }
}

// ========== POST VIEW TASK ==========
function startPostViewTask(taskId, link, duration) {
    if (!USER_JOINED && !confirm("Join না করলে Bonus পাবেন না. চালাবেন?")) return;
    fetch('/api/user/tasks/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ task_id: taskId })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            window.open(link, '_blank');
            showTimer(taskId, data.expires_at, 'verifyPostViewTask', taskId, duration);
        } else {
            showAnimatedNotification(data.message || '❌ টাইমার শুরু করতে ব্যর্থ', 'error');
        }
    })
    .catch(e => {
        showAnimatedNotification('❌ সার্ভার ত্রুটি', 'error');
        console.error(e);
    });
}

async function verifyPostViewTask(taskId, duration) {
    try {
        const res = await fetch('/api/user/tasks/verify_post_view', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ task_id: taskId, view_duration: duration, device_id: DEVICE_ID })
        });
        const data = await res.json();
        if (data.success) {
            showAnimatedNotification(data.message || '✅ টাস্ক সম্পন্ন!', 'success');
            await initTaskPage();
        } else {
            showAnimatedNotification(`❌ ${data.message}`, 'error');
        }
    } catch(e) {
        showAnimatedNotification('❌ সার্ভার ত্রুটি', 'error');
        console.error(e);
    }
}

// ========== SMART CLICK TASK ==========
function startSmartClickTask(taskId, adUrl) {
    if (!USER_JOINED && !confirm("Join না করলে Bonus পাবেন না. চালাবেন?")) return;
    const telegramId = localStorage.getItem('telegram_id');
    const clickId = btoa(`${telegramId}_${taskId}_${Date.now()}`);
    fetch('/adsterra/click_track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ click_id: clickId, telegram_id: telegramId, task_id: taskId })
    })
    .then(() => {
        fetch('/api/user/tasks/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ task_id: taskId })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                window.open(`${adUrl}?subid=${clickId}`, '_blank');
                showTimer(taskId, data.expires_at, 'verifySmartClickTask', taskId, clickId);
            } else {
                showAnimatedNotification(data.message || '❌ টাইমার শুরু করতে ব্যর্থ', 'error');
            }
        });
    })
    .catch(e => {
        showAnimatedNotification('❌ ক্লিক ট্র্যাক করতে ব্যর্থ', 'error');
        console.error(e);
    });
}

async function verifySmartClickTask(taskId, clickId) {
    try {
        const res = await fetch('/api/user/tasks/verify_smart_click', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ task_id: taskId, click_id: clickId, device_id: DEVICE_ID })
        });
        const data = await res.json();
        if (data.success) {
            showAnimatedNotification(data.message || '✅ স্মার্ট ক্লিক সম্পন্ন!', 'success');
            await initTaskPage();
        } else {
            showAnimatedNotification(`❌ ${data.message}`, 'error');
        }
    } catch(e) {
        showAnimatedNotification('❌ সার্ভার ত্রুটি', 'error');
        console.error(e);
    }
}

// ========== CHANNEL TASK ==========
function startChannelTask(taskId, link, duration) {
    if (!USER_JOINED && !confirm("Join না করলে Bonus পাবেন না. চালাবেন?")) return;
    isTaskRunning = true;
    fetch('/api/user/tasks/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ task_id: taskId })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            let channelUrl = link;
            if (link.startsWith('@')) channelUrl = `https://t.me/${link.replace('@', '')}`;
            else if (!link.startsWith('http')) channelUrl = `https://t.me/${link}`;
            window.open(channelUrl, '_blank');
            showTimer(taskId, data.expires_at, 'verifyChannelTask', taskId);
        } else {
            showAnimatedNotification(data.message || '❌ টাইমার শুরু করতে ব্যর্থ', 'error');
            isTaskRunning = false;
        }
    })
    .catch(e => {
        showAnimatedNotification('❌ সার্ভার ত্রুটি', 'error');
        console.error(e);
        isTaskRunning = false;
    });
}

async function verifyChannelTask(taskId) {
    try {
        const res = await fetch('/api/user/tasks/verify_channel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ task_id: taskId, device_id: DEVICE_ID })
        });
        const data = await res.json();
        if (data.redirect) {
            showAnimatedNotification("সেশন শেষ, পুনরায় লগইন করুন", "warning");
            setTimeout(() => window.location.href = data.redirect, 1500);
            isTaskRunning = false;
        } else if (data.success) {
            showAnimatedNotification(data.message || '✅ টাস্ক সম্পন্ন!', 'success');
            isTaskRunning = false;
            await initTaskPage();
        } else {
            showAnimatedNotification(`❌ ${data.message}`, 'error');
            isTaskRunning = false;
        }
    } catch(e) {
        showAnimatedNotification('❌ সার্ভার ত্রুটি', 'error');
        console.error(e);
        isTaskRunning = false;
    }
}

// ========== TIMER HELPER ==========
function showTimer(taskId, expiresAt, verifyFn, ...args) {
    const btn = document.querySelector(`#btn-${taskId}`) || document.querySelector(`#post-btn-${taskId}`) || document.querySelector(`#smart-btn-${taskId}`);
    if (!btn) return;
    btn.disabled = true;
    const timerDiv = document.createElement('div');
    timerDiv.style.cssText = 'font-size:12px; color:#ffaa00; margin:5px 0; text-align:center;';
    btn.parentNode.appendChild(timerDiv);
    const interval = setInterval(() => {
        const diff = new Date(expiresAt) - new Date();
        if (diff <= 0) {
            clearInterval(interval);
            timerDiv.innerHTML = '⏰ সময় শেষ!';
            btn.disabled = false;
            btn.innerText = '⛔ বন্ধ';
            btn.style.background = '#ff0055';
            btn.style.color = '#fff';
            return;
        }
        const secs = Math.floor(diff / 1000);
        timerDiv.innerHTML = `⏱️ বাকি: ${secs}s`;
        if (secs <= 5) {
            timerDiv.style.color = '#ff0055';
            timerDiv.style.fontWeight = 'bold';
            if (secs === 0) {
                timerDiv.innerHTML = '✅ VERIFY করুন!';
                btn.disabled = false;
                btn.innerText = '✅ VERIFY';
                btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc66)';
                btn.style.color = '#000';
                btn.onclick = () => {
                    const fn = window[verifyFn];
                    if (fn) fn(...args);
                };
                clearInterval(interval);
            }
        }
    }, 1000);
}

function showAnimatedNotification(message, type = 'info', duration = 3000) {
    let icon = '';
    if (type === 'success') icon = '✅';
    else if (type === 'error') icon = '❌';
    else if (type === 'warning') icon = '⚠️';
    else icon = 'ℹ️';
    const toast = document.createElement('div');
    toast.className = `notification-toast ${type}`;
    toast.style.animation = 'slideInUp 0.3s ease';
    toast.innerHTML = `<div class="notification-icon">${icon}</div><div class="notification-text">${escapeHtml(message)}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 500);
    }, duration);
}

function injectSafeAdHTML(htmlString) {
    const container = document.getElementById('banner-ad');
    if (!container) return;
    container.innerHTML = '';
    const temp = document.createElement('div');
    temp.innerHTML = htmlString;
    const scripts = Array.from(temp.querySelectorAll('script'));
    for (let node of temp.childNodes) {
        if (node.nodeType === 1 && node.tagName === 'SCRIPT') continue;
        container.appendChild(node.cloneNode(true));
    }
    scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        if (oldScript.src) newScript.src = oldScript.src;
        else newScript.textContent = oldScript.textContent;
        container.appendChild(newScript);
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function renderMilestones(milestones) {
    const container = document.getElementById('milestones-container');
    if (!container) return;
    if (!milestones || milestones.length === 0) {
        container.innerHTML = '<div class="milestone-item" style="text-align:center;">🎯 কোনো মাইলস্টোন সক্রিয় নেই</div>';
        return;
    }
    let html = '';
    for (let m of milestones) {
        const percent = (m.progress / m.target) * 100;
        let statusText = '';
        let claimButton = '';
        if (m.already_claimed) statusText = '<span style="color:var(--active-green);">✅ বোনাস প্রাপ্ত</span>';
        else if (m.achieved) {
            statusText = '<span style="color:var(--gold);">🎉 বোনাস নিন!</span>';
            claimButton = `<button class="btn-milestone-claim" onclick="claimMilestone('${m.id}')">🎁 বোনাস নিন</button>`;
        } else {
            statusText = `<span>📊 অগ্রগতি: ${m.progress}/${m.target}</span>`;
        }
        html += `
            <div class="milestone-item" style="animation: fadeInUp 0.3s ease;">
                <h4>🎯 ${m.type === 'task' ? 'টাস্ক' : m.type === 'referral' ? 'রেফারেল' : 'ডিপোজিট'} – ${m.target} টি</h4>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%; animation: fillProgress 0.5s ease;"></div></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                    <div class="milestone-reward">🏆 পুরস্কার: ${m.reward_amount} ${m.reward_type === 'bdt' ? '৳' : 'AAF'}</div>
                    <div>${statusText}</div>
                </div>
                ${claimButton}
            </div>
        `;
    }
    container.innerHTML = html;
}

async function claimMilestone(milestoneId) {
    try {
        const res = await fetch('/api/user/claim_milestone', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ milestone_id: milestoneId })
        });
        const data = await res.json();
        if (data.success) {
            showAnimatedNotification('🎉 বোনাস আপনার ওয়ালেটে জমা হয়েছে!', 'success');
            initTaskPage();
        } else {
            showAnimatedNotification(data.error || 'বোনাস নেওয়া যায়নি', 'error');
        }
    } catch (e) {
        showAnimatedNotification('সার্ভার ত্রুটি', 'error');
    }
}

// ========== ড্রপডাউন ফাংশন ==========
function toggleDropdown() {
    const menu = document.getElementById('dropdownMenu');
    const arrow = document.getElementById('dropdownArrow');
    if (!menu) return;
    if (menu.style.display === 'none' || menu.style.display === '') {
        menu.style.display = 'block';
        if (arrow) arrow.classList.add('rotated');
    } else {
        menu.style.display = 'none';
        if (arrow) arrow.classList.remove('rotated');
    }
}

document.addEventListener('click', function(event) {
    const btn = document.getElementById('taskDropdownBtn');
    const menu = document.getElementById('dropdownMenu');
    if (btn && menu && !btn.contains(event.target) && !menu.contains(event.target)) {
        menu.style.display = 'none';
        const arrow = document.getElementById('dropdownArrow');
        if (arrow) arrow.classList.remove('rotated');
    }
});

function selectOption(option) {
    const icon = document.getElementById('dropdownIcon');
    const text = document.getElementById('dropdownText');
    if (option === 'task') {
        if (icon) icon.innerHTML = '📋';
        if (text) text.innerHTML = 'Task';
    } else if (option === 'order') {
        if (icon) icon.innerHTML = '📦';
        if (text) text.innerHTML = 'Task Order';
    }
}

function setButtonByCurrentPage() {
    const currentPath = window.location.pathname;
    const icon = document.getElementById('dropdownIcon');
    const text = document.getElementById('dropdownText');
    if (!icon || !text) return;
    if (currentPath === '/task' || currentPath === '/') {
        icon.innerHTML = '📋';
        text.innerHTML = 'Task';
    } else if (currentPath === '/task_order') {
        icon.innerHTML = '📦';
        text.innerHTML = 'Task Order';
    } else {
        icon.innerHTML = '📋';
        text.innerHTML = 'Task';
    }
}

// ========== ডিউ স্ট্যাটাস ==========
async function loadDueStatus() {
    try {
        const res = await fetch('/api/user/due_status', { credentials: 'include' });
        const data = await res.json();
        if (data.success && data.due > 0) {
            const warnDiv = document.getElementById('due-warning');
            if (warnDiv) {
                warnDiv.style.display = 'block';
                warnDiv.innerHTML = `
                    <div style="background: rgba(255,100,0,0.2); border: 1px solid #ffaa00; border-radius: 10px; padding: 10px; margin: 10px 0;">
                        <i class="fas fa-exclamation-triangle" style="color: #ffaa00;"></i>
                        <strong style="font-size: 12px;">${data.message}</strong>
                        <details style="margin-top: 5px; font-size: 11px;">
                            <summary style="cursor: pointer; color: #ffaa00;">বিস্তারিত দেখুন</summary>
                            <ul style="margin-top: 5px; padding-left: 20px;">
                                ${data.details.map(d => `<li>📌 ${escapeHtml(d.task_title)}: ৳${d.due_amount} ডিউ</li>`).join('')}
                            </ul>
                        </details>
                    </div>
                `;
            }
        } else {
            const warnDiv = document.getElementById('due-warning');
            if (warnDiv) warnDiv.style.display = 'none';
        }
    } catch(e) { console.log("Due status error", e); }
}

// ========== RENDER FUNCTIONS ==========
function renderTaskUI(user, admin, tasks, milestones) {
    console.log("🎨 Rendering UI with user:", user);
    if (user) {
        updateBalance(user.cash || 0, user.aaf || 0);
        USER_JOINED = user.is_joined === true;
    } else {
        updateBalance(0, 0);
        USER_JOINED = false;
    }
    const joinWarning = document.getElementById('join-warning');
    if (joinWarning) joinWarning.style.display = USER_JOINED ? 'none' : 'flex';
    if (milestones && milestones.length > 0) renderMilestones(milestones);
    if (admin && admin.banner_ad_code) injectSafeAdHTML(admin.banner_ad_code);
}

async function renderTasks(tasks) {
    const list = document.getElementById('main-task-list');
    if (!list) return;
    let claimedIds = [];
    try {
        const claimedRes = await fetch(`${API}/api/user/claimed_tasks`, { credentials: 'include' });
        const claimedData = await claimedRes.json();
        claimedIds = claimedData.claimed_ids || [];
    } catch(e) { console.log("Error fetching claimed tasks", e); }
    const availableTasks = tasks.filter(t => !claimedIds.includes(t.id));
    list.innerHTML = "";
    if (availableTasks.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:40px; color: var(--active-green);"><i class="fas fa-check-circle"></i> অভিনন্দন! আপনি সব টাস্ক সম্পন্ন করেছেন। নতুন টাস্ক আসছে শীঘ্রই।</div>';
        return;
    }
    availableTasks.forEach(t => {
        const reward = t.currency === 'aaf' ? `AAF ${t.reward}` : `৳${t.reward}`;
        let iconHtml = '', buttonHtml = '', extraInfo = '';
        if (t.type === 'telegram_channel') {
            iconHtml = '<i class="fab fa-telegram"></i>';
            buttonHtml = `<button class="btn-claim" id="btn-${t.id}" onclick="startChannelTask('${t.id}','${t.link}',${t.timer || 30})">🚀 JOIN & EARN</button>`;
        } else if (t.type === 'post_view') {
            iconHtml = '<i class="fas fa-eye" style="color:#8b5cf6;"></i>';
            extraInfo = `<small style="color:#8b5cf6;">⏱️ ${t.view_duration || 30} সেকেন্ড</small>`;
            buttonHtml = `<button class="btn-claim" id="post-btn-${t.id}" onclick="startPostViewTask('${t.id}','${t.link}',${t.view_duration || 30})">👁️ ভিউ করুন</button>`;
        } else if (t.type === 'smart_click') {
            iconHtml = '<i class="fas fa-ad" style="color:#ff6b6b;"></i>';
            extraInfo = `<small style="color:#ff6b6b;">📊 Adsterra</small>`;
            buttonHtml = `<button class="btn-claim" id="smart-btn-${t.id}" onclick="startSmartClickTask('${t.id}','${t.adsterra_url || t.link}')">🌐 স্মার্ট ক্লিক</button>`;
        }
        list.innerHTML += `
            <div class="task-card" style="animation: fadeInUp 0.3s ease;">
                <div class="task-top">
                    <div class="task-icon">${iconHtml}</div>
                    <div class="task-info">
                        <h4>${escapeHtml(t.title)}</h4>
                        <p>${t.description || 'লিংকে ক্লিক করে কাজ শেষ করুন'}</p>
                        ${extraInfo}
                    </div>
                    <div class="reward-tag">${reward}</div>
                </div>
                ${buttonHtml}
            </div>
        `;
    });
}
