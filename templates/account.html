<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF | Account Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712; --card: #0d111c; --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe; --primary: #39d353; --gold: #ffaa00;
            --danger: #ff4444; --text-dim: #8b949e; 
        }

        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 130px; overflow-x: hidden; }

        /* Sliding Cover Section (এডমিন ব্যানারের জন্য) */
        .profile-container { position: relative; width: 100%; height: 210px; overflow: hidden; background: #000; }
        .cover-slider { position: absolute; width: 200%; height: 100%; display: flex; transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { width: 50%; height: 100%; background-size: cover; background-position: center; }
        .slide-default { background-image: url('https://via.placeholder.com/800x210?text=AAF+Default+Banner'); }
        .slide-ad { background-color: #0d111c; background-size: cover; background-position: center; }

        /* Avatar Section (স্থির লোগো) */
        .avatar-wrapper { position: relative; width: 85px; height: 85px; margin: -45px auto 10px; z-index: 10; }
        .tg-avatar { 
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--cyan); 
            overflow: hidden; background: #1e293b; box-shadow: 0 0 20px rgba(0,242,254,0.4); 
            display: flex; align-items: center; justify-content: center; font-size: 30px; 
        }
        .tg-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* ইউজারের নাম ও আইডি (কাভার থেকে সরিয়ে নিচে আনা হয়েছে) */
        .user-info-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px; text-align: center; margin: 15px 20px;
        }
        .user-info-card h3 { font-family: 'Syncopate'; font-size: 18px; margin: 0; color: var(--cyan); }
        .user-info-card p { font-size: 12px; color: var(--text-dim); margin: 5px 0 0; }

        /* Wallets & Account List */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 15px 10px; border-radius: 18px; text-align: center; }
        .info-card span { font-size: 8px; font-family: 'Syncopate'; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .info-card h4 { margin: 0; font-size: 15px; font-family: 'Syncopate'; letter-spacing: 1px; }

        .account-item { 
            background: var(--card); border: 1px solid var(--border); padding: 12px; 
            border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; 
        }
        .account-item .info { flex: 1; cursor: pointer; }
        .account-item button { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; }

        /* Buttons & Modal */
        .action-btn { margin: 12px 20px; padding: 16px; border-radius: 15px; text-align: center; font-family: 'Syncopate'; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .btn-offer { background: linear-gradient(90deg, #00f2fe, #0088cc); color: #000; font-weight: bold; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2); }
        .btn-add { border: 1px dashed var(--cyan); color: var(--cyan); }
        .btn-logout { border: 1px solid var(--danger); color: var(--danger); }

        #ad-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 380px; background: var(--card); border: 1px solid var(--cyan); border-radius: 25px; padding: 25px; text-align: center; }
        .modal-content img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }

        /* Navigation */
        .bottom-nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; z-index: 2000; }
        .bottom-nav { background: #0d111c; display: flex; justify-content: space-around; padding: 12px; border: 1px solid var(--border); border-radius: 50px; backdrop-filter: blur(10px); }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 10px; text-align: center; flex: 1; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
    </style>
</head>
<body>

    <!-- Popup Modal -->
    <div id="ad-modal">
        <div class="modal-content">
            <img id="popup-img" src="" alt="Ad">
            <h3 id="popup-title" style="color: var(--cyan); font-size: 16px;">OFFER</h3>
            <p id="popup-desc" style="font-size: 13px; color: var(--text-dim); margin-bottom: 20px;"></p>
            <button onclick="closePopup()" style="width: 100%; background: var(--cyan); border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;">CLOSE</button>
        </div>
    </div>

    <!-- Cover Slider (Banner) -->
    <div class="profile-container">
        <div class="cover-slider" id="main-slider">
            <div class="slide slide-default"></div>
            <div class="slide slide-ad" id="admin-banner-slide"></div>
        </div>
    </div>

    <!-- Avatar with fixed logo -->
    <div class="avatar-wrapper">
        <div class="tg-avatar" id="main-avatar">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" onerror="this.src='https://via.placeholder.com/85?text=AAF'">
        </div>
    </div>

    <!-- User Name & ID (below avatar) -->
    <div class="user-info-card">
        <h3 id="u-name">LOADING...</h3>
        <p id="u-id">ID: 000000</p>
    </div>

    <!-- Offer Button -->
    <div class="action-btn btn-offer" onclick="showOfferPopup()">
        <i class="fas fa-bolt"></i> &nbsp; VIEW SPECIAL OFFER
    </div>

    <!-- Wallets -->
    <div class="info-grid">
        <div class="info-card">
            <span>CASH WALLET</span>
            <h4 id="cash-bal">৳ 0.00</h4>
        </div>
        <div class="info-card" style="border-color: var(--gold);">
            <span>AAF COINS</span>
            <h4 id="coin-bal" style="color: var(--gold);">0.00</h4>
        </div>
    </div>

    <!-- Connected Accounts List -->
    <div style="padding: 10px 20px 0;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span style="font-size: 10px; font-family: 'Syncopate'; color: var(--text-dim);">SAVED ACCOUNTS</span>
            <span onclick="clearAllData()" style="font-size: 9px; color: var(--danger); cursor: pointer;">REMOVE ALL</span>
        </div>
        <div id="accounts-display">
            <!-- Accounts will be injected here -->
        </div>
    </div>

    <!-- Action Buttons -->
    <div style="padding: 5px 0;">
    <!-- ADD বাটন - ঠিক আছে -->
    <div class="action-btn btn-add" onclick="addNewAccount()" style="display: block; text-align: center; cursor: pointer;">
        <i class="fas fa-plus-circle"></i> &nbsp; ADD TELEGRAM ACCOUNT
    </div>

    <!-- LOGOUT বাটন - <div> এ পরিবর্তন করুন -->
    <div class="action-btn btn-logout" onclick="logoutSession()" style="display: block; text-align: center; cursor: pointer;">
        <i class="fas fa-sign-out-alt"></i> &nbsp; LOGOUT CURRENT SESSION
    </div>
    </div>

    <!-- Navigation -->
    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <a href="dashboard" class="nav-item"><i class="fas fa-home"></i>Home</a>
            <a href="tasks" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="trading" class="nav-item"><i class="fas fa-chart-line"></i>Trade</a>
            <a href="wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="account" class="nav-item active"><i class="fas fa-user"></i>Account</a>
        </nav>
    </div>

    <script>
const API = window.location.origin;
const TG_KEY = "telegram_id";
let popupData = null;

// ===== SLIDER =====
let currentSlide = 0;
setInterval(() => {
    const slider = document.getElementById('main-slider');
    if (slider) {
        currentSlide = (currentSlide === 0) ? 50 : 0;
        slider.style.transform = `translateX(-${currentSlide}%)`;
    }
}, 6000);

// ===== INIT =====
window.addEventListener('load', async () => {
    const tg = localStorage.getItem(TG_KEY);
    if (!tg) {
        location.href = "/login";
        return;
    }
    await initializeApp();
    await loadSavedList();  // ← এখানে await যোগ করুন
});
// ===== LOAD USER + ADS =====
async function initializeApp() {
    const tg = localStorage.getItem(TG_KEY);
    try {
        const res = await fetch(`${API}/api/user/data/${tg}`, { credentials: "include" });
        const data = await res.json();
        if (data.status !== "success") return;

        const user = data.user;
        const admin = data.admin;

        document.getElementById('u-name').innerText = (user.username || "USER").toUpperCase();
        document.getElementById('u-id').innerText = "ID: " + user.telegram_id;
        document.getElementById('cash-bal').innerText = "৳ " + parseFloat(user.cash || 0).toFixed(2);
        document.getElementById('coin-bal').innerText = parseFloat(user.aaf || 0).toFixed(2);

        // বর্তমান ইউজারের নাম localStorage-এ সংরক্ষণ (সেভ করা লিস্টে নাম দেখানোর জন্য)
        localStorage.setItem(`user_${user.telegram_id}_name`, user.username || "User");

        if (admin.banner_image) {
            document.getElementById('admin-banner-slide').style.backgroundImage = `url('${admin.banner_image}')`;
        }
        popupData = admin.popup_ad || null;

    } catch (err) {
        console.error("Init Error:", err);
        document.getElementById('u-name').innerText = "OFFLINE";
    }
}

// ===== POPUP =====
function showOfferPopup() {
    if (popupData && popupData.enabled) {
        document.getElementById('popup-img').src = popupData.image;
        document.getElementById('popup-title').innerText = popupData.title;
        document.getElementById('popup-desc').innerText = popupData.desc;
        document.getElementById('ad-modal').style.display = 'block';
    } else {
        alert("No active offers!");
    }
}
function closePopup() { document.getElementById('ad-modal').style.display = 'none'; }

// ===== MULTI ACCOUNT (শুধু localStorage, কোনো API কল নেই) =====
async function loadSavedList() {
    const box = document.getElementById('accounts-display');
    const current = localStorage.getItem(TG_KEY);
    const saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");
    box.innerHTML = '';
    for (let id of saved) {
        if (id === current) continue;
        let username = localStorage.getItem(`user_${id}_name`);
        if (!username) {
            try {
                const res = await fetch(`${API}/api/user/data/${id}`, { credentials: "include" });
const data = await res.json();
if (data.status === "success") {
    username = data.user.username || "User";
    localStorage.setItem(`user_${id}_name`, username);
                } else {
                    username = "User";
                }
            } catch (e) {
                username = "User";
            }
        }
        box.innerHTML += `
            <div class="account-item">
                <div class="info" onclick="switchAccount('${id}')">
                    <b>${escapeHtml(username)}</b><br>
                    <small>ID: ${id}</small>
                </div>
                <button onclick="removeOne('${id}')">❌</button>
            </div>
        `;
    }
    if (box.innerHTML === '') {
        box.innerHTML = '<div style="text-align:center; opacity:0.5; padding:20px;">No saved accounts</div>';
    }
}

function switchAccount(id) {
    const current = localStorage.getItem(TG_KEY);
    let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");
    if (current && !saved.includes(current)) saved.push(current);
    saved = saved.filter(x => x !== id);
    localStorage.setItem('saved_accounts', JSON.stringify(saved));
    localStorage.setItem(TG_KEY, id);
    location.reload();
}

function removeOne(id) {
    let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");
    saved = saved.filter(x => x !== id);
    localStorage.setItem('saved_accounts', JSON.stringify(saved));
    loadSavedList(); // লিস্ট রিফ্রেশ
}

        // addNewAccount - ঠিক আছে
function addNewAccount() {
    const current = localStorage.getItem(TG_KEY);
    console.log("Adding account:", current); // ডিবাগ

    if (current) {
        let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");
        if (!saved.includes(current)) {
            saved.push(current);
            localStorage.setItem('saved_accounts', JSON.stringify(saved));
            console.log("Saved accounts after add:", saved); // ডিবাগ
        }
    }
    localStorage.removeItem(TG_KEY);
    location.href = "/login";
}

// logoutSession - আলাদা ফাংশন
function logoutSession() {
    if (confirm('Are you sure you want to logout?')) {
        const current = localStorage.getItem(TG_KEY);
        if (current) {
            let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");
            if (!saved.includes(current)) {
                saved.push(current);
                localStorage.setItem('saved_accounts', JSON.stringify(saved));
            }
        }
        localStorage.removeItem(TG_KEY);
        location.href = "/login";
    }
}

// clearAllData - যোগ করুন
function clearAllData() {
    if (confirm('Are you sure you want to remove all saved accounts?')) {
        localStorage.removeItem('saved_accounts');
        loadSavedList();
    }
}

function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>
