<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>টেলিগ্রাম চ্যাট ভিউয়ার - AAF অ্যাডমিন টুল</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <a href="/admin" class="back-link">← অ্যাডমিন প্যানেলে ফিরুন</a>
    <h2 style="color:#00f2fe;">📱 টেলিগ্রাম চ্যাট ভিউয়ার</h2>
    <p style="font-size:12px;">সেশন স্ট্রিং দিন, তারপর চ্যাট লিস্ট দেখুন। যেকোনো চ্যাটে ক্লিক করে বার্তা পড়ুন।</p>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="sessionInput" placeholder="সেশন স্ট্রিং পেস্ট করুন" style="flex:1;">
        <button onclick="loadDialogs()">📂 চ্যাট লিস্ট লোড করুন</button>
    </div>
    <div id="dialogsContainer"></div>
    <div id="messagesContainer"></div>
</div>

<script>
async function loadDialogs() {
    const sessionStr = document.getElementById('sessionInput').value.trim();
    if (!sessionStr) {
        alert('সেশন স্ট্রিং দিন');
        return;
    }
    const container = document.getElementById('dialogsContainer');
    container.innerHTML = '<div style="text-align:center;">⏳ লোড হচ্ছে...</div>';
    try {
        const res = await fetch('/api/admin/chat_dialogs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ session_string: sessionStr })
        });
        const data = await res.json();
        if (data.success && data.dialogs.length) {
            let html = '<h3>চ্যাট লিস্ট</h3>';
            data.dialogs.forEach(d => {
                html += `
                    <div class="chat-item" onclick="loadMessages(${d.id}, '${escapeHtml(d.name)}')">
                        <strong>${escapeHtml(d.name)}</strong> (${d.id})<br>
                        <small>অপঠিত: ${d.unread_count} | সর্বশেষ: ${escapeHtml(d.last_message.substring(0, 50))}</small>
                    </div>
                `;
            });
            container.innerHTML = html;
            // সেশন স্ট্রিং সংরক্ষণ (মেসেজ লোডের জন্য)
            window.currentSession = sessionStr;
        } else {
            container.innerHTML = `<div class="error">❌ কোনো চ্যাট পাওয়া যায়নি বা ত্রুটি: ${data.error || ''}</div>`;
        }
    } catch(e) {
        container.innerHTML = `<div class="error">❌ সার্ভার কানেকশন ব্যর্থ</div>`;
    }
}

async function loadMessages(chatId, chatName) {
    const sessionStr = window.currentSession;
    if (!sessionStr) return alert('পূর্বে চ্যাট লিস্ট লোড করুন');
    const container = document.getElementById('messagesContainer');
    container.innerHTML = `<h3>📩 ${escapeHtml(chatName)} - বার্তা</h3><div>⏳ লোড হচ্ছে...</div>`;
    try {
        const res = await fetch('/api/admin/chat_messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ session_string: sessionStr, chat_id: chatId, limit: 50 })
        });
        const data = await res.json();
        if (data.success && data.messages.length) {
            let html = `<h3>📩 ${escapeHtml(chatName)} - সর্বশেষ বার্তা</h3>`;
            data.messages.forEach(msg => {
                html += `
                    <div class="message-item">
                        <div><strong>📅 ${new Date(msg.date).toLocaleString()}</strong> | সেন্ডার: ${msg.sender_id}</div>
                        <div>${escapeHtml(msg.text)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div class="error">❌ কোনো বার্তা পাওয়া যায়নি বা ত্রুটি: ${data.error || ''}</div>`;
        }
    } catch(e) {
        container.innerHTML = `<div class="error">❌ বার্তা লোড ব্যর্থ</div>`;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
    fetch('/api/admin/chat_dialogs', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify({ session_string: 'YOUR_VALID_SESSION_STRING' })
}).then(r=>r.json()).then(console.log)
</script>
</body>
</html>
