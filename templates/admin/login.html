<!DOCTYPE html>
<html>
<head>
    <title>AAF Admin Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="admin-login-overlay">
        <div class="login-box">
            <h2>AAF MASTER CONTROL</h2>
            <input type="password" id="admin-pass" placeholder="Enter PIN">
            <button onclick="handleLogin()">UNLOCK</button>
        </div>
    </div>
    <script>
        async function handleLogin() {
            const pin = document.getElementById('admin-pass').value;
            const r = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin })
            });
            const d = await r.json();
            if (d.ok) window.location.href = '/admin/dashboard';
            else alert('Wrong PIN!');
        }
    </script>
</body>
</html>
